<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Añade un comentario y valoración sobre tu estancia en Alohame.">
    <meta name="keywords" content="comentario, valoración, reseña, alohame">
    <meta name="author" content="Alohame">
    <meta name="robots" content="noindex, nofollow">
    <title>Añadir Comentario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/crearcomentario.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: mainNavbar}"></div>

<main class="crearcomentario-wrapper">
    <h1 class="crearcomentario-title">Nuevo Comentario</h1>

    <form th:action="@{/guardarComentario}" method="post" class="crearcomentario-form">

        <div class="mb-3">
            <label for="id_usuario" class="form-label">ID Usuario:</label>
            <input type="number" id="id_usuario" name="id_usuario" class="form-control">
        </div>

        <div class="mb-3">
            <label for="id_propiedad" class="form-label">ID Propiedad:</label>
            <input type="number" id="id_propiedad" name="id_propiedad" class="form-control">
        </div>

        <div class="mb-3">
            <label for="comentario" class="form-label">Comentario:</label>
            <input type="text" id="comentario" name="comentario" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label d-block">Puntuación:</label>
            <div class="star-rating" role="radiogroup" aria-label="Puntuación de 1 a 5 estrellas">
                <input type="radio" id="star5" name="puntuacion" value="5" required>
                <label for="star5" title="5 estrellas">&#9733;</label>
                <input type="radio" id="star4" name="puntuacion" value="4">
                <label for="star4" title="4 estrellas">&#9733;</label>
                <input type="radio" id="star3" name="puntuacion" value="3">
                <label for="star3" title="3 estrellas">&#9733;</label>
                <input type="radio" id="star2" name="puntuacion" value="2">
                <label for="star2" title="2 estrellas">&#9733;</label>
                <input type="radio" id="star1" name="puntuacion" value="1">
                <label for="star1" title="1 estrella">&#9733;</label>
            </div>
        </div>

        <button type="submit" class="btn btn-primary">Guardar</button>

    </form>

    <a th:href="@{/}" class="crearcomentario-back mt-3 d-inline-block">⬅ Volver al inicio</a>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
