<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Añadir Comentario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/crearcomentario.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: mainNavbar}"></div>

<main class="crearcomentario-wrapper">
    <h1 class="crearcomentario-title">Nuevo Comentario</h1>

    <form th:action="@{/guardarComentario}" method="post" class="crearcomentario-form">

        <div class="mb-3">
            <label for="id_usuario" class="form-label">ID Usuario:</label>
            <input type="number" id="id_usuario" name="id_usuario" class="form-control">
        </div>

        <div class="mb-3">
            <label for="id_propiedad" class="form-label">ID Propiedad:</label>
            <input type="number" id="id_propiedad" name="id_propiedad" class="form-control">
        </div>

        <div class="mb-3">
            <label for="comentario" class="form-label">Comentario:</label>
            <input type="text" id="comentario" name="comentario" class="form-control">
        </div>

        <div class="mb-3">
            <label for="puntuacion" class="form-label">Puntuación (1-5):</label>
            <input type="number" id="puntuacion" name="puntuacion" min="1" max="5" class="form-control">
        </div>

        <button type="submit" class="btn btn-primary">Guardar</button>

    </form>

    <a th:href="@{/}" class="crearcomentario-back mt-3 d-inline-block">⬅ Volver al inicio</a>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
