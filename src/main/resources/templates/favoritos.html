<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Favoritos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/favoritos.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: mainNavbar}"></div>

<main class="container mt-4">

    <header class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h2 mb-0">Mis favoritos <span class="badge text-bg-danger ms-1" id="favoritos-count" th:text="${favoritosCount}">0</span></h1>
        <nav aria-label="Navegación de usuario">
            <a th:href="@{/propiedades}" class="btn btn-outline-secondary">Ver todas</a>
            <a th:href="@{/cliente}" class="btn btn-outline-secondary">Mis reservas</a>
            <a th:href="@{/logout}" class="btn btn-outline-danger">Salir</a>
        </nav>
    </header>

    <div th:if="${propiedades.isEmpty()}" class="sin-favoritos">
        <div class="sin-favoritos-icon" aria-hidden="true">♡</div>
        <h2 class="h4">No tienes favoritos aun</h2>
        <p class="text-muted mb-3">Comienza a guardar tus propiedades favoritas</p>
        <a th:href="@{/propiedades}" class="btn btn-primary">Explorar propiedades</a>
    </div>

    <section aria-label="Propiedades favoritas">
        <div class="row" id="favoritos-grid" th:unless="${propiedades.isEmpty()}">
            <div class="col-12 col-md-6 col-lg-4 mb-4" th:each="p : ${propiedades}" th:attr="data-propiedad-id=${p['id']}">
                <article class="card propiedad-card">

                    <img th:if="${p['url']}"
                         th:src="@{'/' + ${p['url']}}"
                         class="propiedad-imagen"
                         th:alt="${'Imagen de ' + p['titulo']}" />
                    <div th:if="${p['url'] == null}" class="propiedad-imagen bg-light d-flex align-items-center justify-content-center">
                        <span class="text-muted">Sin imagen</span>
                    </div>

                    <button type="button"
                            class="btn-favorito is-favorito"
                            th:onclick="'eliminarDeFavoritos(' + ${p['id']} + ')'"
                            title="Eliminar de favoritos">
                        ♥
                    </button>

                    <div class="card-body d-flex flex-column">

                        <h2 class="h5 card-title" th:text="${p['titulo']}"></h2>

                        <p class="text-muted mb-2 small">
                            <span th:text="${p['ubicacion']}"></span>
                        </p>

                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <span class="text-muted small">
                                <span th:text="${p['capacidad']}"></span> personas
                            </span>
                            <span class="precio-noche" th:text="'€' + ${#numbers.formatDecimal(p['precio_noche'], 1, 2)}"></span>
                        </div>

                        <a th:href="@{/propiedad/{id}(id=${p['id']})}"
                           class="btn btn-outline-primary btn-sm mt-auto">Ver detalles</a>

                    </div>
                </article>
            </div>
        </div>
    </section>

</main>

<script th:inline="javascript">
const propiedadesUrl = /*[[@{/propiedades}]]*/ '/propiedades';
const favoritoEliminarUrl = /*[[@{/favorito/eliminar}]]*/ '/favorito/eliminar';

function updateFavoritosCount(count) {
    const badge = document.getElementById('favoritos-count');
    if (!badge) return;
    const parsed = Number(count);
    badge.textContent = Number.isNaN(parsed) ? '0' : String(parsed);
}

function showToast(message, type) {
    const toastContainer = document.getElementById('toast-container') || createToastContainer();
    const toast = document.createElement('div');
    toast.className = `alert ${type === 'error' ? 'alert-danger' : 'alert-success'} shadow-sm mb-2`;
    toast.style.minWidth = '260px';
    toast.textContent = message;
    toastContainer.appendChild(toast);
    setTimeout(() => toast.remove(), 2200);
}

function createToastContainer() {
    const container = document.createElement('div');
    container.id = 'toast-container';
    container.style.position = 'fixed';
    container.style.top = '16px';
    container.style.right = '16px';
    container.style.zIndex = '2000';
    document.body.appendChild(container);
    return container;
}

function renderEmptyStateIfNeeded() {
    const grid = document.getElementById('favoritos-grid');
    if (!grid) return;

    const cards = grid.querySelectorAll('[data-propiedad-id]');
    if (cards.length > 0) return;

    const empty = document.createElement('div');
    empty.className = 'sin-favoritos';
    empty.innerHTML = `
        <div class="sin-favoritos-icon" aria-hidden="true">♡</div>
        <h2 class="h4">No tienes favoritos aun</h2>
        <p class="text-muted mb-3">Comienza a guardar tus propiedades favoritas</p>
        <a href="${propiedadesUrl}" class="btn btn-primary">Explorar propiedades</a>
    `;

    grid.replaceWith(empty);
}

function eliminarDeFavoritos(idPropiedad) {
    fetch(favoritoEliminarUrl, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: 'idPropiedad=' + idPropiedad
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            const cardCol = document.querySelector(`[data-propiedad-id="${idPropiedad}"]`);
            if (cardCol) {
                cardCol.remove();
            }
            updateFavoritosCount(data.favoritosCount);
            renderEmptyStateIfNeeded();
            showToast('Eliminado de favoritos', 'success');
        } else {
            showToast(data.message || 'No se pudo eliminar favorito', 'error');
        }
    })
    .catch(() => showToast('Error de red al eliminar favorito', 'error'));
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
