<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Alohame</title>
</head>
<body>

<!-- HEADER -->
<h1>🏠 Alohame</h1>

<!-- LOGIN / LOGOUT -->
<div th:if="${session.usuario == null}">
    <a href="/login">
        <button>🔐 Iniciar sesión</button>
    </a>
    <a href="/crearUsuario">
        <button>📝 Registrarse</button>
    </a>
</div>

<div th:if="${session.usuario != null}">
    <p th:text="'Bienvenido ' + ${session.usuario['nombre']}"></p>

    <a href="/logout">
        <button>🚪 Cerrar sesión</button>
    </a>
</div>

<hr>

<!-- BUSCADOR -->
<h2>🔍 Buscar alojamiento</h2>
<form action="/propiedades" method="get">
    <input type="text" name="ciudad" placeholder="Ciudad">
    <button type="submit">Buscar</button>
</form>

<hr>

<!-- LISTADO DE PROPIEDADES -->
<h2>🏡 Propiedades disponibles</h2>

<div th:each="propiedad : ${propiedades}">

    <h3 th:text="${propiedad['titulo']}"></h3>

    <p th:text="${propiedad['ubicacion']}"></p>

    <p th:text="'Precio: ' + ${propiedad['precio_noche']} + '€'"></p>

    <img th:src="@{ ${propiedad['url']}}" width="200">

    <a th:href="@{'/detallePropiedad/' + ${propiedad['id']}}">
        <button>Ver detalle</button>
    </a>

</div>

</body>
</html>
