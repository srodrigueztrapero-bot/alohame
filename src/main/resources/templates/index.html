<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Alohame</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<!-- HEADER -->
<nav class="navbar navbar-light bg-light px-4">
    <span class="navbar-brand mb-0 h1">🏠 Alohame</span>

    <div>
        <a href="/login" class="btn btn-outline-dark me-2">Login</a>
        <a href="/crearUsuario" class="btn btn-dark">Registro</a>
    </div>
</nav>

<!-- LOGIN / LOGOUT -->
<div th:if="${session.usuario == null}">
    <a href="/login">
        <button>🔐 Iniciar sesión</button>
    </a>
    <a href="/crearUsuario">
        <button>📝 Registrarse</button>
    </a>
</div>

<div th:if="${session.usuario != null}">
    <p th:text="'Bienvenido ' + ${session.usuario['nombre']}"></p>

    <a href="/logout">
        <button>🚪 Cerrar sesión</button>
    </a>
</div>

<hr>

<!-- BUSCADOR -->
<h2>🔍 Buscar alojamiento</h2>
<form action="/propiedades" method="get">
    <input type="text" name="ciudad" placeholder="Ciudad">
    <button type="submit">Buscar</button>
</form>

<hr>

<!-- PROPIEDADES -->
<div class="container mt-4">

    <h2 class="mb-4">🏡 Propiedades disponibles</h2>

    <div class="row">

        <div class="col-md-4 mb-4" th:each="propiedad : ${propiedades}">

            <div class="card h-100 shadow-sm">

                <img th:if="${propiedad['url'] != null}"
                     th:src="@{'/' + ${propiedad['url']}}"
                     class="card-img-top"
                     style="height:200px; object-fit:cover;">

                <div class="card-body">
                    <h5 class="card-title" th:text="${propiedad['titulo']}"></h5>

                    <p class="card-text text-muted" th:text="${propiedad['ubicacion']}"></p>

                    <p class="fw-bold text-primary"
                       th:text="${propiedad['precio_noche']} + ' € / noche'"></p>

                    <a th:href="@{'/propiedad/' + ${propiedad['id']}}"
                       class="btn btn-dark w-100">
                        Ver detalle
                    </a>
                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
