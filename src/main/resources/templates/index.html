<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Alohame</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/index.css}">
</head>
<body>

<!-- NAVBAR MEJORADA CON LOGO -->
<nav class="navbar navbar-expand-lg bg-dark navbar-dark shadow-lg">
    <div class="container-fluid px-4 navbar-three-col">

        <!-- Columna izquierda: links de navegación -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse navbar-left" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link active" href="/">Inicio</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/propiedades">Propiedades</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/mapa">Mapa</a>
                </li>
                <li class="nav-item" th:if="${session.usuario != null && session.usuario['tipo_usuario'] == 'cliente'}">
                    <a class="nav-link" href="/cliente">Mis Reservas</a>
                </li>
                <li class="nav-item" th:if="${session.usuario != null && session.usuario['tipo_usuario'] == 'propietario'}">
                    <a class="nav-link" href="/propietario">Mis Propiedades</a>
                </li>
                <li class="nav-item" th:if="${session.usuario != null && session.usuario['tipo_usuario'] == 'admin'}">
                    <a class="nav-link" href="/admin">Admin</a>
                </li>
            </ul>
        </div>

        <!-- Columna central: logo + título -->
        <a class="navbar-brand navbar-center d-flex align-items-center" href="/">
            <span class="brand-logo-wrap">
                <img src="/images/alohame-logo.png" alt="Logo Alohame" class="brand-logo">
            </span>
            <span class="fw-bold fs-5">Alohame</span>
        </a>

        <!-- Columna derecha: sesión -->
        <div class="navbar-right d-flex align-items-center gap-2">
            <div th:if="${session.usuario == null}" class="d-flex gap-2">
                <a href="/login" class="btn btn-outline-light btn-sm rounded-pill">
                    Iniciar sesión
                </a>
                <a href="/registro" class="btn btn-light btn-sm rounded-pill">
                    Registrarse
                </a>
            </div>
            <div th:if="${session.usuario != null}" class="d-flex align-items-center gap-2">
                <span class="text-white fw-semibold" th:text="${session.usuario['nombre']}"></span>
                <a href="/logout" class="btn btn-outline-danger btn-sm rounded-pill">
                    Salir
                </a>
            </div>
        </div>

    </div>
</nav>

<!-- BUSCADOR FUNCIONAL -->
<div class="bg-light py-5 border-bottom search-hero-section">
    <div class="container">
        <h1 class="text-center mb-4 index-hero-title">Encuentra tu alojamiento perfecto</h1>

        <form action="/propiedades" method="get" class="row g-3 justify-content-center hero-search-form">
            <div class="col-md-6">
                <input type="text" name="ciudad" class="form-control form-control-lg hero-search-input"
                       placeholder="¿A dónde viajas?" required>
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-primary btn-lg w-100 hero-search-btn">
                    Buscar
                </button>
            </div>
        </form>
    </div>
</div>

<div class="container mt-4">

    <h2 class="mb-4">🏡 Propiedades disponibles</h2>

    <div class="row">

        <div class="col-12 col-md-6 col-lg-4 mb-4" th:each="propiedad : ${propiedades}">

            <div class="card h-100 shadow-sm position-relative">

                <img th:if="${propiedad['url'] != null}"
                     th:src="@{'/' + ${propiedad['url']}}"
                     class="card-img-top index-card-image">

                <div class="card-body">

                    <h5 class="card-title" th:text="${propiedad['titulo']}"></h5>

                    <p class="mb-1 text-warning small">
                        ⭐ <span th:text="${#numbers.formatDecimal(propiedad['media_puntuacion'], 1, 1)}"></span>
                    </p>

                    <p class="card-text text-muted mb-1">
                        📍 <span th:text="${propiedad['ubicacion']}"></span>
                    </p>

                    <p class="fw-bold text-danger fs-5"
                       th:text="${propiedad['precio_noche']} + ' € / noche'"></p>

                    <a th:href="@{'/propiedad/' + ${propiedad['id']}}"
                       class="btn btn-dark w-100 rounded-pill py-2">
                        Ver detalle
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script defer src="/js/navbar-scroll.js"></script>
</body>
</html>
