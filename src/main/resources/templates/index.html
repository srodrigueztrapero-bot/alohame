<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Alohame</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar navbar-expand-lg bg-white shadow-sm px-4 py-2">

    <a class="navbar-brand d-flex align-items-center" href="/">
        <img src="/images/logo.png" alt="logo" style="height:120px;">
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        <div class="d-flex align-items-center gap-3">

            <div th:if="${session.usuario == null}" class="d-flex gap-2">
                <a href="/login" class="btn btn-outline-dark rounded-pill px-3">
                    Iniciar sesión
                </a>

                <a href="/registro" class="btn btn-dark rounded-pill px-3">
                    Registrarse
                </a>
            </div>

            <div th:if="${session.usuario != null}" class="d-flex align-items-center gap-3">
                <span class="fw-semibold text-dark"
                      th:text="${session.usuario['nombre']}"></span>

                <div class="rounded-circle bg-dark text-white d-flex justify-content-center align-items-center"
                     style="width:35px; height:35px;">
                    👤
                </div>

                <a href="/logout" class="btn btn-outline-danger rounded-pill btn-sm">
                    Salir
                </a>
            </div>

        </div>
    </div>

</nav>
<div class="container mt-3">

    <!-- TABS -->
    <div class="d-flex justify-content-center gap-5 mb-3 tabs">

        <div class="tab active">
            🏠 <span>Alojamientos</span>
        </div>

    </div>

    <!-- BUSCADOR -->
    <div class="search-bar d-flex align-items-center justify-content-between">

        <div class="search-item">
            <strong>Destino</strong>
            <span>Buscar destinos</span>
        </div>

        <div class="divider"></div>

        <div class="search-item">
            <strong>Fechas</strong>
            <span>Introduce las fechas</span>
        </div>

        <div class="divider"></div>

        <div class="search-item">
            <strong>Viajeros</strong>
            <span>Añade viajeros</span>
        </div>

        <!-- BOTÓN -->
        <button class="search-btn">
            🔍
        </button>

    </div>

</div>

<div class="container mt-4">

    <h2 class="mb-4">🏡 Propiedades disponibles</h2>

    <div class="row">

        <div class="col-12 col-md-6 col-lg-4 mb-4" th:each="propiedad : ${propiedades}">

            <div class="card h-100 shadow-sm position-relative">

                <img th:if="${propiedad['url'] != null}"
                     th:src="@{'/' + ${propiedad['url']}}"
                     class="card-img-top"
                     style="height:200px; object-fit:cover;">

                <div class="card-body">

                    <h5 class="card-title" th:text="${propiedad['titulo']}"></h5>

                    <p class="mb-1 text-warning small">
                        ⭐ <span th:text="${#numbers.formatDecimal(propiedad['media_puntuacion'], 1, 1)}"></span>
                    </p>

                    <p class="card-text text-muted mb-1">
                        📍 <span th:text="${propiedad['ubicacion']}"></span>
                    </p>

                    <p class="fw-bold text-danger fs-5"
                       th:text="${propiedad['precio_noche']} + ' € / noche'"></p>

                    <a th:href="@{'/propiedad/' + ${propiedad['id']}}"
                       class="btn btn-dark w-100 rounded-pill py-2">
                        Ver detalle
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
