<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Inicia sesión en tu cuenta de Alohame.">
    <meta name="keywords" content="login, iniciar sesión, acceso, alohame">
    <meta name="author" content="Alohame">
    <meta name="robots" content="noindex, nofollow">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: mainNavbar}"></div>

<main class="container login-container">

    <header class="text-center mb-4">
        <h1 class="fw-bold">Iniciar sesion</h1>
        <p class="text-muted">Accede a tu cuenta en Alohame</p>
    </header>

    <div th:if="${param.registered}" class="alert alert-success success-alert" role="alert">
        Usuario registrado correctamente. Por favor inicia sesion.
    </div>

    <form th:action="@{/login}" method="post" class="card p-4 shadow-sm">

        <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" id="email" name="email" class="form-control" placeholder="tu@email.com" required>
        </div>

        <div class="mb-3">
            <label for="password" class="form-label">Contrasena</label>
            <input type="password" id="password" name="password" class="form-control" placeholder="Tu contrasena" required>
        </div>

        <button type="submit" class="btn btn-dark w-100">Entrar</button>

        <p th:if="${error}" th:text="${error}" class="text-danger text-center mt-3"></p>

    </form>

    <div class="registro-link">
        <p class="text-muted mb-3">No tienes cuenta?</p>
        <a th:href="@{/registro}" class="btn btn-outline-primary w-100">Registrate aqui</a>
    </div>

    <div class="text-center mt-3">
        <a th:href="@{/}" class="btn btn-outline-secondary">Volver al inicio</a>
    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
