<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/login.css}">
    <style>
        .login-container {
            max-width: 500px;
            margin-top: 5rem;
        }
        .divider {
            display: flex;
            align-items: center;
            margin: 2rem 0;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #ccc;
        }
        .divider-text {
            padding: 0 1rem;
            color: #999;
            font-size: 0.9rem;
        }
        .registro-link {
            text-align: center;
            padding-top: 1rem;
            border-top: 1px solid #eee;
        }
        .success-alert {
            display: block;
        }
    </style>
</head>
<body>

<div class="container login-container">

    <div class="text-center mb-4">
        <h1 class="fw-bold">Iniciar sesion</h1>
        <p class="text-muted">Accede a tu cuenta en Alohame</p>
    </div>

    <div th:if="${param.registered}" class="alert alert-success success-alert" role="alert">
        Usuario registrado correctamente. Por favor inicia sesion.
    </div>

    <form action="/login" method="post" class="card p-4 shadow-sm">

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" placeholder="tu@email.com" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Contrasena</label>
            <input type="password" name="password" class="form-control" placeholder="Tu contrasena" required>
        </div>

        <button type="submit" class="btn btn-dark w-100">Entrar</button>

        <p th:if="${error}" th:text="${error}" class="text-danger text-center mt-3"></p>

    </form>

    <div class="registro-link">
        <p class="text-muted mb-3">No tienes cuenta?</p>
        <a href="/registro" class="btn btn-outline-primary w-100">Registrate aqui</a>
    </div>

    <div class="text-center mt-3">
        <a href="/" class="btn btn-outline-secondary">Volver al inicio</a>
    </div>

</div>

</body>
</html>
