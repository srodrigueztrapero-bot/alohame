<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container mt-5" style="max-width: 500px;">

    <div class="text-center mb-4">
        <h1 class="fw-bold">Iniciar sesión</h1>
        <p class="text-muted">Accede a tu cuenta en Alohame</p>
    </div>

    <form action="/login" method="post" class="card p-4 shadow-sm">

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" placeholder="Email" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" placeholder="Password" required>
        </div>

        <button type="submit" class="btn btn-dark w-100">Entrar</button>
    </form>

    <p th:if="${error}" th:text="${error}" class="text-danger text-center mt-3"></p>

    <div class="text-center mt-3">
        <a href="/" class="btn btn-outline-secondary">⬅ Volver al inicio</a>
    </div>

</div>

</body>
</html>
