<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Zona Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container mt-5">

    <div class="text-center mb-4">
        <h1 class="fw-bold">👑 Panel de Administración</h1>
        <p class="text-muted">Bienvenido, Admin Alohame</p>
    </div>

    <div class="text-center mb-4">
        <a href="/" class="btn btn-outline-secondary rounded-pill px-4 me-2">
            ⬅ Inicio
        </a>
        <a href="/logout" class="btn btn-outline-danger rounded-pill px-4">
            🚪 Cerrar sesión
        </a>
    </div>

    <div class="row text-center g-4">

        <div class="col-md-3">
            <a href="/usuarios" class="text-decoration-none">
                <div class="card p-4 shadow-sm h-100 admin-card">
                    <h3>👤</h3>
                    <h5>Usuarios</h5>
                </div>
            </a>
        </div>

        <div class="col-md-3">
            <a href="/propiedades" class="text-decoration-none">
                <div class="card p-4 shadow-sm h-100 admin-card">
                    <h3>🏠</h3>
                    <h5>Propiedades</h5>
                </div>
            </a>
        </div>

        <div class="col-md-3">
            <a href="/reservas" class="text-decoration-none">
                <div class="card p-4 shadow-sm h-100 admin-card">
                    <h3>📅</h3>
                    <h5>Reservas</h5>
                </div>
            </a>
        </div>

        <div class="col-md-3">
            <a href="/comentarios" class="text-decoration-none">
                <div class="card p-4 shadow-sm h-100 admin-card">
                    <h3>💬</h3>
                    <h5>Comentarios</h5>
                </div>
            </a>
        </div>

    </div>

</div>
</body>
</html>
