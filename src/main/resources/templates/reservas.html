<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Reservas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">📅 Lista de Reservas</h2>
        <div class="d-flex gap-2">
            <a href="/admin" class="btn btn-outline-secondary">⬅ Panel admin</a>
            <a href="/logout" class="btn btn-outline-danger">Salir</a>
        </div>
    </div>

    <div class="table-responsive">

        <table class="table table-hover table-striped align-middle">

            <thead class="table-dark">
            <tr>
                <th>Usuario</th>
                <th>Propiedad</th>
                <th>Inicio</th>
                <th>Fin</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="reserva : ${reservas}">

                <td th:text="${reserva['id_usuario']}"></td>
                <td th:text="${reserva['id_propiedad']}"></td>
                <td th:text="${reserva['fecha_inicio']}"></td>
                <td th:text="${reserva['fecha_fin']}"></td>

                <td>
                    <span class="badge bg-success"
                          th:if="${reserva['estado'] == 'confirmada'}">Confirmada</span>

                    <span class="badge bg-warning text-dark"
                          th:if="${reserva['estado'] == 'pendiente'}">Pendiente</span>

                    <span class="badge bg-danger"
                          th:if="${reserva['estado'] == 'cancelada'}">Cancelada</span>
                </td>

                <td>
                    <a th:href="@{/reserva/cancelar/{id}(id=${reserva['id']})}"
                       class="btn btn-sm btn-outline-danger">
                        Cancelar
                    </a>
                </td>

            </tr>

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
