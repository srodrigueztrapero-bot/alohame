<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Detalle propiedad</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div class="container mt-4">

  <!-- BOTÓN VOLVER -->
  <a href="/" class="btn btn-outline-dark mb-3">⬅ Volver</a>

  <!-- TÍTULO -->
  <h2 class="fw-bold mb-3" th:text="${propiedad['titulo']}"></h2>

  <!-- GALERÍA DE IMÁGENES -->
  <div id="carouselPropiedad" class="carousel slide mb-4">

    <div class="carousel-inner">

      <div th:each="img, iterStat : ${imagenes}"
           th:class="'carousel-item ' + (${iterStat.index} == 0 ? 'active' : '')">

        <img th:src="@{'/' + ${img['url']}}"
             class="d-block w-100 rounded"
             style="height:400px; object-fit:cover;">
      </div>

    </div>

    <!-- BOTÓN ANTERIOR -->
    <button class="carousel-control-prev" type="button"
            data-bs-target="#carouselPropiedad" data-bs-slide="prev">
      <span class="carousel-control-prev-icon"></span>
    </button>

    <!-- BOTÓN SIGUIENTE -->
    <button class="carousel-control-next" type="button"
            data-bs-target="#carouselPropiedad" data-bs-slide="next">
      <span class="carousel-control-next-icon"></span>
    </button>
    <div class="carousel-indicators">
      <button th:each="img, iterStat : ${imagenes}"
              type="button"
              data-bs-target="#carouselPropiedad"
              th:attr="data-bs-slide-to=${iterStat.index}"
              th:classappend="${iterStat.index == 0} ? 'active'">
      </button>
    </div>
  </div>

  <!-- INFO -->
  <div class="card p-4 shadow-sm">

    <p class="text-muted" th:text="${propiedad['ubicacion']}"></p>

    <p th:text="${propiedad['descripcion']}"></p>

    <p><strong>Capacidad:</strong>
      <span th:text="${propiedad['capacidad']}"></span> personas
    </p>

    <h4 class="text-primary fw-bold"
        th:text="${propiedad['precio_noche']} + ' € / noche'"></h4>

  </div>
  <h4>💬 Comentarios</h4>

  <div th:each="comentario : ${comentarios}" class="card mb-2 p-2">

    <p th:text="${comentario['comentario']}"></p>

    <small>
      ⭐ <span th:text="${comentario['puntuacion']}"></span>
    </small>

  </div>
  <div th:if="${session.usuario != null and session.usuario['tipo_usuario'] == 'cliente'}">>

    <h5>Añadir comentario</h5>

    <form action="/comentario/guardar" method="post">

      <input type="hidden" name="id_propiedad" th:value="${propiedad['id']}">

      <textarea name="comentario" class="form-control mb-2" required></textarea>

      <select name="puntuacion" class="form-select mb-2">
        <option value="1">1 ⭐</option>
        <option value="2">2 ⭐</option>
        <option value="3">3 ⭐</option>
        <option value="4">4 ⭐</option>
        <option value="5">5 ⭐</option>
      </select>

      <button class="btn btn-primary">Enviar</button>

    </form>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
