<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Gestión de usuarios en Alohame.">
    <meta name="keywords" content="usuarios, gestión, administración, alohame">
    <meta name="author" content="Alohame">
    <meta name="robots" content="noindex, nofollow">
    <title>Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/usuarios.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: mainNavbar}"></div>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4 usuarios-header">
        <h1 class="mb-0">Lista de Usuarios</h1>
        <div class="d-flex gap-2">
            <a th:href="@{/admin}" class="btn btn-outline-secondary">⬅ Panel admin</a>
            <a th:href="@{/logout}" class="btn btn-outline-danger">Salir</a>
        </div>
    </div>

    <a th:href="@{/registro}" class="btn btn-success mb-3">
        ➕ Añadir usuario
    </a>

    <div class="table-responsive usuarios-table-wrap">

        <table class="table table-hover table-striped align-middle usuarios-table">

            <thead class="table-dark">
            <tr>
                <th>Nombre</th>
                <th>Email</th>
                <th>Teléfono</th>
                <th>Fecha</th>
                <th>Tipo</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="usuario : ${usuarios}">

                <td th:text="${usuario['nombre']}"></td>

                <td th:text="${usuario['email']}"></td>

                <td th:text="${usuario['telefono']}"></td>

                <td th:text="${usuario['fecha_registro']}"></td>

                <td>
                    <span class="badge bg-primary"
                          th:text="${usuario['tipo_usuario']}"></span>
                </td>

            </tr>

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
