<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Usuarios</title>
</head>
<body>

<h1>Lista de Usuarios</h1>

<a href="/Añadir usuario">
    <button>➕ Añadir usuario</button></a>

<table border="1">
    <tr>
        <th>Nombre</th>
        <th>Email</th>
        <th>password</th>
        <th>telefono</th>
        <th>fecha_registro</th>
        <th>tipo</th>

    </tr>

    <tr th:each="u : ${usuarios}">
        <td th:text="${u.nombre}"></td>
        <td th:text="${u.email}"></td>
        <td th:text="${u.password}"></td>
        <td th:text="${u.telefono}"></td>
        <td th:text="${u.fecha_registro}"></td>
        <td th:text="${u.tipo}"></td>
    </tr>

</table>

<a href="/">
    <button>➕ ⬅ Volver al inicio</button></a>

</body>
</html>
