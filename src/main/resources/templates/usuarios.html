<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Usuarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/usuarios.css}">
</head>
<body>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="mb-0">Lista de Usuarios</h1>
        <div class="d-flex gap-2">
            <a href="/admin" class="btn btn-outline-secondary">⬅ Panel admin</a>
            <a href="/logout" class="btn btn-outline-danger">Salir</a>
        </div>
    </div>

    <a href="/crearUsuario" class="btn btn-success mb-3">
        ➕ Añadir usuario
    </a>

    <div class="table-responsive">

        <table class="table table-hover table-striped align-middle">

            <thead class="table-dark">
            <tr>
                <th>Nombre</th>
                <th>Email</th>
                <th>Teléfono</th>
                <th>Fecha</th>
                <th>Tipo</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="usuario : ${usuarios}">

                <td th:text="${usuario['nombre']}"></td>

                <td th:text="${usuario['email']}"></td>

                <td th:text="${usuario['telefono']}"></td>

                <td th:text="${usuario['fecha_registro']}"></td>

                <td>
                    <span class="badge bg-primary"
                          th:text="${usuario['tipo_usuario']}"></span>
                </td>

            </tr>

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
