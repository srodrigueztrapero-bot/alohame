<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Zona Cliente</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">📅 Mis reservas</h2>
        <div class="d-flex gap-2">
            <a href="/" class="btn btn-outline-secondary">⬅ Inicio</a>
            <a href="/logout" class="btn btn-outline-danger">Salir</a>
        </div>
    </div>

    <div class="row">

        <div class="col-12 col-md-6 col-lg-4 mb-4" th:each="r : ${reservas}">

            <div class="card h-100 shadow-sm p-3">

                <h5 th:text="${r['titulo']}"></h5>

                <p class="text-muted" th:text="${r['ubicacion']}"></p>

                <p>
                    <strong>Desde:</strong>
                    <span th:text="${r['fecha_inicio']}"></span>
                </p>

                <p>
                    <strong>Hasta:</strong>
                    <span th:text="${r['fecha_fin']}"></span>
                </p>

                <p>
                    <strong>Estado:</strong>
                    <span th:text="${r['estado']}"></span>
                </p>

            </div>

        </div>

    </div>

</div>

</body>
</html>
