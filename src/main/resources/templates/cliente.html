<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zona Cliente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/cliente.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: mainNavbar}"></div>
<main class="container mt-4">
    <header class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h2 mb-0">Mis reservas</h1>
        <nav aria-label="Navegación de usuario">
            <a th:href="@{/favoritos}" class="btn btn-outline-danger">Mis favoritos <span class="badge text-bg-light ms-1" th:text="${favoritosCount}">0</span></a>
            <a th:href="@{/propiedades}" class="btn btn-outline-secondary">Ver propiedades</a>
            <a th:href="@{/}" class="btn btn-outline-secondary">Inicio</a>
            <a th:href="@{/logout}" class="btn btn-outline-danger">Salir</a>
        </nav>
    </header>

    <section aria-label="Lista de reservas">
        <div class="row">
            <div class="col-12 col-md-6 col-lg-4 mb-4" th:each="r : ${reservas}">
                <article class="card h-100 shadow-sm propiedad-card">
                    <img th:if="${r['url'] != null}"
                         th:src="@{'/' + ${r['url']}}"
                         class="propiedad-imagen"
                         th:alt="${'Imagen de ' + r['titulo']}" />
                    <div th:if="${r['url'] == null}" class="propiedad-imagen bg-light d-flex align-items-center justify-content-center">
                        <span class="text-muted">Sin imagen</span>
                    </div>

                    <div class="card-body d-flex flex-column">
                        <h2 class="h5 card-title" th:text="${r['titulo']}"></h2>

                        <p class="text-muted mb-2">
                            <span th:text="${r['ubicacion']}"></span>
                        </p>

                        <p class="text-secondary mb-2" th:text="${#strings.abbreviate(r['descripcion'], 100)}"></p>

                        <p class="mb-2">
                            <strong>Capacidad:</strong>
                            <span th:text="${r['capacidad']}"></span> personas
                        </p>

                        <p class="mb-3">
                            <strong>Precio por noche:</strong>
                            <span class="precio-noche" th:text="'€' + ${#numbers.formatDecimal(r['precio_noche'], 1, 2)}"></span>
                        </p>

                        <div class="reserva-fecha">
                            <p class="mb-1">
                                <strong>Desde:</strong>
                                <span th:text="${r['fecha_inicio']}"></span>
                            </p>
                            <p class="mb-0">
                                <strong>Hasta:</strong>
                                <span th:text="${r['fecha_fin']}"></span>
                            </p>
                        </div>

                        <p class="mt-3 mb-0">
                            <strong>Estado:</strong>
                            <span class="badge"
                                  th:class="'badge ' + (${r['estado']} == 'confirmada' ? 'estado-confirmada' : 'estado-cancelada')"
                                  th:text="${r['estado']}"></span>
                        </p>

                        <a th:href="@{/propiedad/{id}(id=${r['id_propiedad']})}"
                           class="btn btn-primary btn-sm mt-3 w-100">Ver propiedad</a>
                    </div>
                </article>
            </div>
        </div>
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
