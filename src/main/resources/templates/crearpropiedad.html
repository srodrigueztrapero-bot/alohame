<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Crear Propiedad</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container mt-5" style="max-width: 800px;">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="mb-0">🏡 Añadir nueva propiedad</h2>
    <a href="/propietario" class="btn btn-outline-secondary">⬅ Volver</a>
  </div>

  <form action="/guardarPropiedad" method="post" enctype="multipart/form-data" class="card p-4 shadow">

    <div class="mb-3">
      <label class="form-label">Título</label>
      <input type="text" name="titulo" class="form-control" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Descripción</label>
      <textarea name="descripcion" class="form-control" rows="4"></textarea>
    </div>

    <div class="row">
      <div class="col-md-6 mb-3">
        <label class="form-label">Precio por noche (€)</label>
        <input type="number" name="precio" class="form-control" required>
      </div>

      <div class="col-md-6 mb-3">
        <label class="form-label">Capacidad</label>
        <input type="number" name="capacidad" class="form-control" required>
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label">Ubicación</label>
      <input type="text" name="ubicacion" class="form-control" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Imágenes</label>
      <input type="file" name="imagen" class="form-control">
    </div>

    <button type="submit" class="btn btn-dark w-100">
      💾 Guardar propiedad
    </button>

  </form>

</div>

</body>
</html>
