<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Publica una nueva propiedad en Alohame y comienza a recibir reservas.">
  <meta name="keywords" content="crear propiedad, publicar alojamiento, alohame">
  <meta name="author" content="Alohame">
  <meta name="robots" content="noindex, nofollow">
  <title>Crear Propiedad</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/crearpropiedad.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: mainNavbar}"></div>

<main class="container mt-5 crearpropiedad-wrapper">

  <div class="d-flex justify-content-between align-items-center mb-4 crearpropiedad-header">
    <h1 class="h2 mb-0">🏡 Añadir nueva propiedad</h1>
    <a th:href="@{/propietario}" class="btn btn-outline-secondary">⬅ Volver</a>
  </div>

  <div th:if="${param.error}" class="alert alert-danger" role="alert" th:text="${param.error}"></div>

  <form th:action="@{/guardarPropiedad}" method="post" enctype="multipart/form-data" class="card p-4 shadow crearpropiedad-card">

    <div class="mb-3">
      <label for="titulo" class="form-label">Título</label>
      <input type="text" id="titulo" name="titulo" class="form-control" required>
    </div>

    <div class="mb-3">
      <label for="descripcion" class="form-label">Descripción</label>
      <textarea id="descripcion" name="descripcion" class="form-control" rows="4"></textarea>
    </div>

    <div class="row">
      <div class="col-md-6 mb-3">
        <label for="precio" class="form-label">Precio por noche (€)</label>
        <input type="number" id="precio" name="precio" class="form-control" required>
      </div>

      <div class="col-md-6 mb-3">
        <label for="capacidad" class="form-label">Capacidad</label>
        <input type="number" id="capacidad" name="capacidad" class="form-control" required>
      </div>
    </div>

    <div class="mb-3">
      <label for="ubicacion" class="form-label">Ubicación</label>
      <input type="text" id="ubicacion" name="ubicacion" class="form-control" required>
    </div>

    <div class="mb-3">
      <label for="imagenes" class="form-label">Imágenes</label>
      <input type="file" id="imagenes" name="imagenes" multiple accept="image/*" class="form-control">
    </div>

    <button type="submit" class="btn btn-dark w-100">
      💾 Guardar propiedad
    </button>

  </form>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
