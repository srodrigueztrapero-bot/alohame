<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Propiedades - Alohame</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/mapa.css}">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>

<div th:replace="~{fragments/navbar :: mainNavbar}"></div>

<!-- CONTENIDO PRINCIPAL -->
<div class="header-mapa">
    <div class="container">
        <h1 class="mb-0" style="color: #10b981;">🗺️ Explora nuestras propiedades en el mapa</h1>
    </div>
</div>

<div class="container">
    <div class="info-mapa">
        <strong>💡 Tip:</strong> Haz clic en cualquier marcador para ver los detalles de la propiedad
    </div>

    <!-- Mapa -->
    <div id="mapa"></div>

    <div class="mt-4 text-center mb-4">
        <a th:href="@{/propiedades}" class="btn btn-outline-secondary">
            ⬅ Volver a la lista
        </a>
    </div>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script th:inline="javascript">
const propiedadDetalleBaseUrl = /*[[@{/propiedad/}]]*/ '/propiedad/';

// Inicializar mapa (centrado en España)
const mapa = L.map('mapa').setView([40.4637, -3.7492], 6);

// Añadir capa de OpenStreetMap
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors',
    maxZoom: 18,
    minZoom: 4
}).addTo(mapa);

// Propiedades desde Thymeleaf
const propiedades = /*[[${propiedades}]]*/ [];
const geocodeCache = new Map();

function crearIconoVerde() {
    return L.icon({
        iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png',
        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
        iconSize: [25, 41],
        iconAnchor: [12, 41],
        popupAnchor: [1, -34],
        shadowSize: [41, 41]
    });
}

function crearPopup(prop) {
    return `
        <div style="font-family: 'Poppins', sans-serif; min-width: 200px;">
            <div class="popup-title">${prop.titulo}</div>
            <div class="popup-info"><strong>📍</strong> ${prop.ubicacion}</div>
            <div class="popup-info"><strong>💰</strong> €${prop.precio_noche}/noche</div>
            <a href="${propiedadDetalleBaseUrl}${prop.id}" class="popup-btn">Ver detalles →</a>
        </div>
    `;
}

async function geocodificarUbicacion(ubicacion) {
    if (!ubicacion) return null;
    const key = ubicacion.trim().toLowerCase();
    if (geocodeCache.has(key)) {
        return geocodeCache.get(key);
    }

    const query = encodeURIComponent(`${ubicacion}, España`);
    const url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&countrycodes=es&q=${query}`;

    try {
        const response = await fetch(url, {
            headers: {
                'Accept': 'application/json'
            }
        });
        if (!response.ok) return null;

        const data = await response.json();
        if (!Array.isArray(data) || data.length === 0) return null;

        const lat = Number(data[0].lat);
        const lon = Number(data[0].lon);
        if (Number.isNaN(lat) || Number.isNaN(lon)) return null;

        const coords = { latitud: lat, longitud: lon };
        geocodeCache.set(key, coords);
        return coords;
    } catch (_) {
        return null;
    }
}

async function pintarMarcadores() {
    const bounds = [];

    for (const prop of propiedades) {
        let lat = Number(prop.latitud);
        let lon = Number(prop.longitud);

        if (Number.isNaN(lat) || Number.isNaN(lon)) {
            const coords = await geocodificarUbicacion(prop.ubicacion);
            if (!coords) continue;
            lat = coords.latitud;
            lon = coords.longitud;
        }

        L.marker([lat, lon], { icon: crearIconoVerde() })
            .bindPopup(crearPopup(prop), {
                maxWidth: 250,
                minWidth: 200,
                className: 'custom-popup'
            })
            .addTo(mapa);

        bounds.push([lat, lon]);
    }

    if (bounds.length > 0) {
        mapa.fitBounds(bounds, { padding: [30, 30], maxZoom: 11 });
    } else {
        console.warn('No hay propiedades geocodificables para mostrar en el mapa');
    }
}

pintarMarcadores();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
