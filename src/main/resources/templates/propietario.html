<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Zona Propietario</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">🏠 Mis propiedades</h2>
        <div class="d-flex gap-2">
            <a href="/" class="btn btn-outline-secondary">⬅ Inicio</a>
            <a href="/logout" class="btn btn-outline-danger">Salir</a>
        </div>
    </div>

    <a href="/crearPropiedad" class="btn btn-success mb-3">
        ➕ Añadir propiedad
    </a>

    <div class="row">

        <div class="col-12 col-md-6 col-lg-4 mb-4" th:each="p : ${propiedades}">

            <div class="card h-100 shadow-sm">

                <img th:if="${p['url'] != null}"
                     th:src="@{'/' + ${p['url']}}"
                     class="card-img-top"
                     style="height:200px; object-fit:cover;">

                <div class="card-body">

                    <h5 th:text="${p['titulo']}"></h5>

                    <p th:text="${p['ubicacion']}"></p>

                    <p class="fw-bold text-primary"
                       th:text="${p['precio_noche']} + ' € / noche'"></p>


                    <a th:href="@{'/editarPropiedad/' + ${p['id']}}"
                       class="btn btn-warning w-100">
                        Editar
                    </a>

                    <a th:href="@{'/eliminarPropiedad/' + ${p.id}}"
                       class="btn btn-danger w-100 mt-2"
                       onclick="return confirm('¿Seguro que quieres eliminar esta propiedad?');">
                        🗑 Eliminar
                    </a>

                </div>

            </div>

        </div>

    </div>
</div>
</body>
</html>
