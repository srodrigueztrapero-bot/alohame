<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Crear usuario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container mt-4" style="max-width: 600px;">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">➕ Crear usuario</h2>
        <a href="/usuarios" class="btn btn-outline-secondary">⬅ Volver</a>
    </div>

    <form th:action="@{/guardarUsuario}" method="post" class="card p-4 shadow-sm">

        <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" name="nombre" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Contraseña</label>
            <input type="password" name="password" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Teléfono</label>
            <input type="text" name="telefono" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Tipo de usuario</label>
            <select name="tipo_usuario" class="form-select" required>
                <option value="cliente">Cliente</option>
                <option value="propietario">Propietario</option>
                <option value="admin">Admin</option>
            </select>
        </div>

        <button type="submit" class="btn btn-dark w-100">Guardar usuario</button>
    </form>

    <div class="mt-3">
        <a href="/" class="btn btn-outline-secondary">⬅ Volver al inicio</a>
    </div>

</div>

</body>
</html>
