<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Crear usuario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .registro-container {
            max-width: 600px;
            margin-top: 2rem;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>

<div class="container registro-container">

    <div class="text-center mb-4">
        <h2 class="fw-bold">Crear nueva cuenta</h2>
        <p class="text-muted">Registrate en Alohame para empezar</p>
    </div>

    <div th:if="${param.error}" class="alert alert-danger" role="alert">
        Error al registrar el usuario. Intenta de nuevo.
    </div>

    <form th:action="@{/guardarUsuario}" method="post" class="card p-4 shadow-sm">

        <div class="mb-3">
            <label class="form-label">Nombre completo</label>
            <input type="text" name="nombre" class="form-control" placeholder="Tu nombre" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" placeholder="tu@email.com" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Contrasena</label>
            <input type="password" name="password" class="form-control" placeholder="Elige una contrasena segura" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Telefono</label>
            <input type="text" name="telefono" class="form-control" placeholder="Tu numero de telefono" required>
        </div>

        <div class="mb-4">
            <label class="form-label">Tipo de cuenta</label>
            <select name="tipo_usuario" class="form-select" required>
                <option value="cliente" selected>Cliente - Buscar propiedades</option>
                <option value="propietario">Propietario - Publicar propiedades</option>
            </select>
            <small class="text-muted d-block mt-2">Puedes cambiar esto despues en tu perfil</small>
        </div>

        <button type="submit" class="btn btn-primary w-100 fw-bold">Crear cuenta</button>
    </form>

    <div class="text-center mt-4">
        <p class="text-muted">Ya tienes cuenta?</p>
        <a href="/login" class="btn btn-outline-secondary w-100">Volver a iniciar sesion</a>
    </div>

    <div class="text-center mt-2">
        <a href="/" class="btn btn-outline-secondary w-100">Volver al inicio</a>
    </div>

</div>

</body>
</html>
