<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="mainNavbar">
<nav class="navbar navbar-expand-lg bg-dark navbar-dark shadow-lg">
    <div class="container-fluid px-4 navbar-three-col">

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavCommon">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse navbar-left" id="navbarNavCommon">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}">Inicio</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/propiedades}">Propiedades</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/mapa}">Mapa</a>
                </li>
                <li class="nav-item" th:if="${session.usuario != null && session.usuario['tipo_usuario'] == 'cliente'}">
                    <a class="nav-link" th:href="@{/cliente}">Mis Reservas</a>
                </li>
                <li class="nav-item" th:if="${session.usuario != null && session.usuario['tipo_usuario'] == 'propietario'}">
                    <a class="nav-link" th:href="@{/propietario}">Mis Propiedades</a>
                </li>
                <li class="nav-item" th:if="${session.usuario != null && session.usuario['tipo_usuario'] == 'admin'}">
                    <a class="nav-link" th:href="@{/admin}">Admin</a>
                </li>
            </ul>
        </div>

        <a class="navbar-brand navbar-center d-flex align-items-center" th:href="@{/}">
            <span class="brand-logo-wrap">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" class="brand-logo" fill="none">
                    <path d="M32 6L6 28h8v26h14V38h8v16h14V28h8L32 6z" fill="white" opacity="0.95"/>
                    <path d="M32 6L6 28h8v26h14V38h8v16h14V28h8L32 6z" stroke="rgba(110,231,183,0.6)" stroke-width="1.5" stroke-linejoin="round"/>
                    <rect x="26" y="38" width="12" height="16" rx="2" fill="rgba(110,231,183,0.35)"/>
                </svg>
            </span>
            <span class="fw-bold fs-5">Alohame</span>
        </a>

        <div class="navbar-right d-flex align-items-center gap-2">
            <div th:if="${session.usuario == null}" class="d-flex gap-2">
                <a th:href="@{/login}" class="btn btn-outline-light btn-sm rounded-pill">Iniciar sesion</a>
                <a th:href="@{/registro}" class="btn btn-light btn-sm rounded-pill">Registrarse</a>
            </div>
            <div th:if="${session.usuario != null}" class="d-flex align-items-center gap-2">
                <span class="text-white fw-semibold" th:text="${session.usuario['nombre']}"></span>
                <a th:href="@{/logout}" class="btn btn-outline-danger btn-sm rounded-pill">Salir</a>
            </div>
        </div>

    </div>
</nav>
<script defer th:src="@{/js/navbar-scroll.js}"></script>
</th:block>
</body>
</html>
