<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Crear Reserva</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/crearReserva.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: mainNavbar}"></div>
<div class="container mt-4 crearreserva-wrapper">
  <h1>Nueva Reserva</h1>

<form action="/guardarReserva" method="post" class="crearreserva-form">

  <input type="hidden" name="id_propiedad" th:value="${id_propiedad}">

  <div class="mb-3">
    <label class="form-label">Fecha inicio:</label>
    <input type="date" name="fecha_inicio" class="form-control" required>
  </div>

  <div class="mb-3">
    <label class="form-label">Fecha fin:</label>
    <input type="date" name="fecha_fin" class="form-control" required>
  </div>

  <div class="crearreserva-actions">
    <button type="submit" class="btn btn-primary">Guardar</button>
    <a th:href="@{/propiedad/{id}(id=${id_propiedad})}" class="btn btn-outline-secondary">
      ⬅ Volver al detalle
    </a>
  </div>
  </form>

  <div th:if="${error}" class="alert alert-danger mt-3">
    <span th:text="${error}"></span>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
