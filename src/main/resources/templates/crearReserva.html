<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear Reserva</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/crearReserva.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: mainNavbar}"></div>
<main class="container mt-4 crearreserva-wrapper">
  <h1>Nueva Reserva</h1>

  <form th:action="@{/guardarReserva}" method="post" class="crearreserva-form">

    <input type="hidden" name="id_propiedad" th:value="${id_propiedad}">

    <div class="mb-3">
      <label for="fecha_inicio" class="form-label">Fecha inicio:</label>
      <input type="date" id="fecha_inicio" name="fecha_inicio" class="form-control" required>
    </div>

    <div class="mb-3">
      <label for="fecha_fin" class="form-label">Fecha fin:</label>
      <input type="date" id="fecha_fin" name="fecha_fin" class="form-control" required>
    </div>

    <div class="crearreserva-actions">
      <button type="submit" class="btn btn-primary">Guardar</button>
      <a th:href="@{/propiedad/{id}(id=${id_propiedad})}" class="btn btn-outline-secondary">
        ⬅ Volver al detalle
      </a>
    </div>
  </form>

  <div th:if="${error}" class="alert alert-danger mt-3">
    <span th:text="${error}"></span>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
