<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Edita los datos de tu propiedad en Alohame.">
    <meta name="keywords" content="editar propiedad, actualizar alojamiento, alohame">
    <meta name="author" content="Alohame">
    <meta name="robots" content="noindex, nofollow">
    <title>Editar Propiedad</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/editarpropiedad.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: mainNavbar}"></div>

<main class="container mt-5 editarpropiedad-wrapper">

    <div class="d-flex justify-content-between align-items-center mb-4 editarpropiedad-header">
        <h1 class="h2 mb-0">✏️ Editar propiedad</h1>
        <a th:href="@{/propietario}" class="btn btn-outline-secondary">⬅ Volver</a>
    </div>

    <div th:if="${param.error}" class="alert alert-danger" role="alert" th:text="${param.error}"></div>

    <form th:action="@{/actualizarPropiedad}" method="post" enctype="multipart/form-data" class="card p-4 shadow editarpropiedad-card">

        <input type="hidden" name="id" th:value="${propiedad.id}">

        <div class="mb-3">
            <label for="titulo" class="form-label">Título</label>
            <input type="text" id="titulo" name="titulo" th:value="${propiedad.titulo}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="descripcion" class="form-label">Descripción</label>
            <textarea id="descripcion" name="descripcion" class="form-control" rows="4" th:text="${propiedad.descripcion}"></textarea>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="precio" class="form-label">Precio (€)</label>
                <input type="number" id="precio" name="precio" th:value="${propiedad.precio_noche}" class="form-control" required>
            </div>

            <div class="col-md-6 mb-3">
                <label for="capacidad" class="form-label">Capacidad</label>
                <input type="number" id="capacidad" name="capacidad" th:value="${propiedad.capacidad}" class="form-control" required>
            </div>
        </div>

        <div class="mb-3">
            <label for="ubicacion" class="form-label">Ubicación</label>
            <input type="text" id="ubicacion" name="ubicacion" th:value="${propiedad.ubicacion}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="imagenes" class="form-label">Añadir nuevas imágenes</label>
            <input type="file" id="imagenes" name="imagenes" multiple accept="image/*" class="form-control">
        </div>

        <!-- COMODIDADES -->
        <div class="mb-4">
            <label class="form-label fw-semibold">Comodidades</label>
            <div class="comodidades-grid">
                <div th:each="c : ${todasComodidades}" class="comodidad-item">
                    <input type="checkbox"
                           name="comodidades"
                           th:value="${c['id']}"
                           th:id="'com-' + ${c['id']}"
                           th:checked="${comodidadesSeleccionadas.contains(c['id'])}"
                           class="comodidad-check">
                    <label th:for="'com-' + ${c['id']}" class="comodidad-label">
                        <i th:class="'bi ' + ${c['icono']}"></i>
                        <span th:text="${c['nombre']}"></span>
                    </label>
                </div>
            </div>
        </div>

        <button type="submit" class="btn btn-dark w-100">
            💾 Guardar cambios
        </button>

    </form>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
