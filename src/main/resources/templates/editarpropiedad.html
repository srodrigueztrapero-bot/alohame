<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Propiedad</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/editarpropiedad.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: mainNavbar}"></div>

<div class="container mt-5 editarpropiedad-wrapper">

    <div class="d-flex justify-content-between align-items-center mb-4 editarpropiedad-header">
        <h2 class="mb-0">✏️ Editar propiedad</h2>
        <a th:href="@{/propietario}" class="btn btn-outline-secondary">⬅ Volver</a>
    </div>

    <div th:if="${param.error}" class="alert alert-danger" role="alert" th:text="${param.error}"></div>

    <form th:action="@{/actualizarPropiedad}" method="post" enctype="multipart/form-data" class="card p-4 shadow editarpropiedad-card">

        <input type="hidden" name="id" th:value="${propiedad.id}">

        <div class="mb-3">
            <label class="form-label">Título</label>
            <input type="text" name="titulo" th:value="${propiedad.titulo}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Descripción</label>
            <textarea name="descripcion" class="form-control" rows="4" th:text="${propiedad.descripcion}"></textarea>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Precio (€)</label>
                <input type="number" name="precio" th:value="${propiedad.precio_noche}" class="form-control" required>
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">Capacidad</label>
                <input type="number" name="capacidad" th:value="${propiedad.capacidad}" class="form-control" required>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Ubicación</label>
            <input type="text" name="ubicacion" th:value="${propiedad.ubicacion}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Añadir nuevas imágenes</label>
            <input type="file" name="imagenes" multiple accept="image/*" class="form-control">
        </div>

        <button type="submit" class="btn btn-dark w-100">
            💾 Guardar cambios
        </button>

    </form>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
