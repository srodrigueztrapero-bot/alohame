<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Editar Propiedad</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Tu CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container mt-5">

    <h2 class="mb-4 text-center">✏️ Editar propiedad</h2>

    <form action="/actualizarPropiedad" method="post" enctype="multipart/form-data" class="card p-4 shadow">

        <input type="hidden" name="id" th:value="${propiedad.id}">

        <div class="mb-3">
            <label class="form-label">Título</label>
            <input type="text" name="titulo" th:value="${propiedad.titulo}" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Descripción</label>
            <textarea name="descripcion" class="form-control" th:text="${propiedad.descripcion}"></textarea>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Precio (€)</label>
                <input type="number" name="precio" th:value="${propiedad.precio_noche}" class="form-control">
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">Capacidad</label>
                <input type="number" name="capacidad" th:value="${propiedad.capacidad}" class="form-control">
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Ubicación</label>
            <input type="text" name="ubicacion" th:value="${propiedad.ubicacion}" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Añadir nuevas imágenes</label>
            <input type="file" name="imagenes" multiple class="form-control">
        </div>

        <button type="submit" class="btn btn-dark w-100">
            💾 Guardar cambios
        </button>

    </form>

</div>
<a href="/">
    <button>➕ ⬅ Volver al inicio</button></a>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
