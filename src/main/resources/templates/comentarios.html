<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Comentarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/comentarios.css}">
</head>
<body>

<div class="container mt-4">

    <h2 class="mb-4">💬 Comentarios</h2>

    <div class="table-responsive">

        <table class="table table-hover table-striped align-middle">

            <thead class="table-dark">
            <tr>
                <th>Usuario</th>
                <th>Propiedad</th>
                <th>Comentario</th>
                <th>Puntuación</th>
                <th>Fecha</th>
                <th>Acciones</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="comentario : ${comentarios}">

                <!-- USUARIO -->
                <td th:text="${comentario['id_usuario']}"></td>

                <!-- PROPIEDAD -->
                <td th:text="${comentario['id_propiedad']}"></td>

                <!-- TEXTO -->
                <td th:text="${comentario['comentario']}"></td>

                <!-- ⭐ PUNTUACIÓN -->
                <td>
                        <span class="text-warning"
                              th:text="${comentario['puntuacion']} + ' ⭐'"></span>
                </td>

                <!-- FECHA -->
                <td th:text="${comentario['fecha']}"></td>

                <!-- ACCIONES -->
                <td>
                    <a th:href="@{/comentario/eliminar/{id}(id=${comentario['id']})}"
                       class="btn btn-sm btn-outline-danger">
                        🗑️ Eliminar
                    </a>
                </td>

            </tr>

            </tbody>

        </table>

    </div>

    <a href="/admin" class="btn btn-outline-dark rounded-pill mt-3">
        ⬅ Volver al panel
    </a>

</div>

</body>
</html>
