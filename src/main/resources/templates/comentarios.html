<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Gestión de comentarios y valoraciones en Alohame.">
    <meta name="keywords" content="comentarios, valoraciones, gestión, alohame">
    <meta name="author" content="Alohame">
    <meta name="robots" content="noindex, nofollow">
    <title>Comentarios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/comentarios.css}">
</head>
<body>

<div th:replace="~{fragments/navbar :: mainNavbar}"></div>

<div class="container mt-4">

    <h2 class="mb-4 comentarios-title">💬 Comentarios</h2>

    <div class="table-responsive comentarios-table-wrap">

        <table class="table table-hover table-striped align-middle comentarios-table">

            <thead class="table-dark">
            <tr>
                <th>Usuario</th>
                <th>Propiedad</th>
                <th>Comentario</th>
                <th>Puntuación</th>
                <th>Fecha</th>
                <th>Acciones</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="comentario : ${comentarios}">

                <!-- USUARIO -->
                <td th:text="${comentario['id_usuario']}"></td>

                <!-- PROPIEDAD -->
                <td th:text="${comentario['id_propiedad']}"></td>

                <!-- TEXTO -->
                <td class="comentario-texto" th:text="${comentario['comentario']}"></td>

                <!-- ⭐ PUNTUACIÓN -->
                <td>
                        <span class="text-warning puntuacion-badge"
                              th:text="${comentario['puntuacion']} + ' ⭐'"></span>
                </td>

                <!-- FECHA -->
                <td th:text="${comentario['fecha']}"></td>

                <!-- ACCIONES -->
                <td>
                    <a th:href="@{/comentario/eliminar/{id}(id=${comentario['id']})}"
                       class="btn btn-sm btn-outline-danger">
                        🗑️ Eliminar
                    </a>
                </td>

            </tr>

            </tbody>

        </table>

    </div>

    <a th:href="@{/admin}" class="btn btn-outline-dark rounded-pill mt-3">
        ⬅ Volver al panel
    </a>

</div>

</body>
</html>
