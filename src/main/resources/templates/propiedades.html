<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Propiedades</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/propiedades.css}">
</head>
<body>

<div class="header-propiedades">
    <div class="container">
        <h1 class="mb-2">Explora nuestras propiedades</h1>
        <p class="mb-0">Encuentra tu lugar ideal para hospedarte</p>
    </div>
</div>

<div class="container">

    <div class="top-bar">
        <div>
            <h5 class="mb-0" th:text="'Total: ' + ${propiedades.size()} + ' propiedades'"></h5>
        </div>
        <div class="d-flex gap-2">
            <th:block th:if="${esAdmin}">
                <a href="/admin" class="btn btn-outline-warning">
                    👑 Volver al Panel Admin
                </a>
            </th:block>
            <th:block th:unless="${esAdmin}">
                <a href="/favoritos" class="btn btn-outline-danger">
                    Ver favoritos <span class="badge text-bg-light ms-1" id="favoritos-count" th:text="${favoritosCount}">0</span>
                </a>
            </th:block>
            <a href="/" class="btn btn-outline-secondary">Inicio</a>
        </div>
    </div>

    <!-- Filtro de busqueda por ciudad -->
    <div class="filtro-section">
        <form method="get" action="/propiedades" class="row g-2">
            <div class="col-md-8">
                <input type="text" name="ciudad" class="form-control" placeholder="Busca por ciudad..." required>
            </div>
            <div class="col-md-4">
                <button type="submit" class="btn btn-primary w-100">Buscar</button>
                <a href="/propiedades" class="btn btn-outline-secondary w-100 mt-2">Ver todas</a>
            </div>
        </form>
    </div>

    <!-- Grid de propiedades -->
    <div class="row">
        <div class="col-12 col-md-6 col-lg-4 mb-4" th:each="propiedad : ${propiedades}">
            <div class="card propiedad-card">

                <!-- Imagen -->
                <div style="position: relative;">
                    <img th:if="${propiedad['url']}"
                         th:src="@{'/' + ${propiedad['url']}}"
                         class="propiedad-imagen"
                         alt="Imagen de propiedad" />
                    <div th:if="${propiedad['url'] == null}" class="propiedad-imagen bg-light d-flex align-items-center justify-content-center">
                        <span class="text-muted">Sin imagen</span>
                    </div>

                    <!-- Boton de favorito -->
                    <button class="btn-favorito"
                            th:id="'favorito-' + ${propiedad['id']}"
                            th:onclick="'toggleFavorito(' + ${propiedad['id']} + ')'"
                            title="Agregar a favoritos">
                        ♡
                    </button>
                </div>

                <div class="card-body d-flex flex-column">

                    <!-- Titulo -->
                    <h5 class="card-title" th:text="${propiedad['titulo']}"></h5>

                    <!-- Ubicacion -->
                    <p class="text-muted mb-2 small">
                        <span th:text="${propiedad['ubicacion']}"></span>
                    </p>

                    <!-- Capacidad y precio -->
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <span class="text-muted small">
                            <span th:text="${propiedad['capacidad']}"></span> personas
                        </span>
                        <span class="precio-noche" th:text="'€' + ${#numbers.formatDecimal(propiedad['precio_noche'], 1, 2)}"></span>
                    </div>

                    <!-- Botones de accion -->
                    <div class="btn-group w-100" role="group">
                        <a th:href="@{/propiedad/{id}(id=${propiedad['id']})}"
                           class="btn btn-outline-primary btn-sm">Ver detalles</a>
                        <a th:href="@{/crearReserva(id_propiedad=${propiedad['id']})}"
                           class="btn btn-primary btn-sm">Reservar</a>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <!-- Sin resultados -->
    <div th:if="${propiedades.isEmpty()}" class="alert alert-info text-center mt-5">
        <h5>No se encontraron propiedades</h5>
        <p>Intenta con otra busqueda</p>
        <a href="/propiedades" class="btn btn-primary">Ver todas las propiedades</a>
    </div>

</div>

<script>
function updateFavoritosCount(count) {
    const badge = document.getElementById('favoritos-count');
    if (!badge) return;
    const parsed = Number(count);
    badge.textContent = Number.isNaN(parsed) ? '0' : String(parsed);
}

function setFavoritoVisual(btn, esFavorito) {
    if (!btn) return;
    btn.classList.toggle('is-favorito', esFavorito);
    btn.title = esFavorito ? 'Eliminar de favoritos' : 'Agregar a favoritos';
    btn.textContent = esFavorito ? '♥' : '♡';
}

function showToast(message, type) {
    const toastContainer = document.getElementById('toast-container') || createToastContainer();
    const toast = document.createElement('div');
    toast.className = `alert ${type === 'error' ? 'alert-danger' : 'alert-success'} shadow-sm mb-2`;
    toast.style.minWidth = '260px';
    toast.textContent = message;
    toastContainer.appendChild(toast);
    setTimeout(() => toast.remove(), 2200);
}

function createToastContainer() {
    const container = document.createElement('div');
    container.id = 'toast-container';
    container.style.position = 'fixed';
    container.style.top = '16px';
    container.style.right = '16px';
    container.style.zIndex = '2000';
    document.body.appendChild(container);
    return container;
}

function toggleFavorito(idPropiedad) {
    const btn = document.getElementById('favorito-' + idPropiedad);

    if (btn.classList.contains('is-favorito')) {
        eliminarDeFavoritos(idPropiedad);
    } else {
        agregarAFavoritos(idPropiedad);
    }
}

function agregarAFavoritos(idPropiedad) {
    fetch('/favorito/agregar', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: 'idPropiedad=' + idPropiedad
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            const btn = document.getElementById('favorito-' + idPropiedad);
            setFavoritoVisual(btn, true);
            updateFavoritosCount(data.favoritosCount);
            showToast('Agregado a favoritos', 'success');
        } else {
            if (data.message.includes('iniciar sesion')) {
                if (confirm('Debes iniciar sesion para usar favoritos. Ir al login?')) {
                    window.location.href = '/login';
                }
            } else {
                showToast(data.message || 'No se pudo agregar favorito', 'error');
            }
        }
    })
    .catch(() => showToast('Error de red al agregar favorito', 'error'));
}

function eliminarDeFavoritos(idPropiedad) {
    fetch('/favorito/eliminar', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: 'idPropiedad=' + idPropiedad
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            const btn = document.getElementById('favorito-' + idPropiedad);
            setFavoritoVisual(btn, false);
            updateFavoritosCount(data.favoritosCount);
            showToast('Eliminado de favoritos', 'success');
        } else {
            showToast(data.message || 'No se pudo eliminar favorito', 'error');
        }
    })
    .catch(() => showToast('Error de red al eliminar favorito', 'error'));
}

// Cargar estado de favoritos al cargar la pagina
document.addEventListener('DOMContentLoaded', function() {
    const buttons = document.querySelectorAll('[id^="favorito-"]');
    buttons.forEach(btn => {
        const idPropiedad = btn.id.replace('favorito-', '');
        fetch('/favorito/verificar/' + idPropiedad)
            .then(response => response.json())
            .then(data => setFavoritoVisual(btn, !!data.esFavorito))
            .catch(() => setFavoritoVisual(btn, false));
    });
});
</script>

</body>
</html>
