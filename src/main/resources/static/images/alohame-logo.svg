<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 250">
  <defs>
    <!-- Gradientes principales -->
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="palmGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Onda de agua suave (abajo) -->
  <path d="M 20 180 Q 60 160 100 175 T 200 180 L 200 200 Q 150 210 100 200 Q 50 210 0 200 Z"
        fill="url(#blueGrad)" opacity="0.9"/>

  <path d="M 0 190 Q 50 180 100 195 T 220 190 L 220 220 L 0 220 Z"
        fill="url(#blueGrad)" opacity="0.6"/>

  <!-- Casa moderna -->
  <g filter="url(#glow)">
    <!-- Paredes de la casa -->
    <rect x="65" y="80" width="80" height="85" fill="#ffffff" stroke="url(#greenGrad)" stroke-width="2.5" rx="8"/>

    <!-- Techo triangular moderno -->
    <polygon points="65,80 105,45 145,80" fill="url(#greenGrad)" stroke="url(#greenGrad)" stroke-width="2"/>

    <!-- Ventana izquierda (grande) -->
    <rect x="75" y="95" width="20" height="20" fill="#a7f3d0" stroke="url(#greenGrad)" stroke-width="1.5" rx="3"/>

    <!-- Ventana derecha (grande) -->
    <rect x="105" y="95" width="20" height="20" fill="#a7f3d0" stroke="url(#greenGrad)" stroke-width="1.5" rx="3"/>

    <!-- Puerta principal -->
    <path d="M 90 140 L 90 160 Q 90 165 95 165 L 115 165 Q 120 165 120 160 L 120 140 Z"
          fill="#10b981" stroke="url(#greenGrad)" stroke-width="1.5"/>
    <circle cx="116" cy="152" r="2.5" fill="#fbbf24"/>
  </g>

  <!-- Palmera (derecha de la casa) -->
  <g>
    <!-- Tronco curvado -->
    <path d="M 160 155 Q 165 130 162 100" stroke="#92400e" stroke-width="6" fill="none"
          stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Frondas principales (superior izquierda) -->
    <path d="M 162 100 Q 150 80 140 70" stroke="url(#palmGrad)" stroke-width="5" fill="none"
          stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 162 100 Q 155 75 148 58" stroke="#10b981" stroke-width="4" fill="none"
          stroke-linecap="round" opacity="0.8"/>

    <!-- Frondas principales (superior derecha) -->
    <path d="M 162 100 Q 175 80 185 65" stroke="url(#palmGrad)" stroke-width="5" fill="none"
          stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 162 100 Q 170 75 180 55" stroke="#34d399" stroke-width="4" fill="none"
          stroke-linecap="round" opacity="0.8"/>

    <!-- Frondas secundarias (media izquierda) -->
    <path d="M 160 120 Q 145 110 135 105" stroke="url(#palmGrad)" stroke-width="4" fill="none"
          stroke-linecap="round" opacity="0.7"/>

    <!-- Frondas secundarias (media derecha) -->
    <path d="M 165 120 Q 180 110 195 105" stroke="url(#palmGrad)" stroke-width="4" fill="none"
          stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- Elementos decorativos de luz -->
  <circle cx="75" cy="90" r="1.5" fill="#fbbf24" opacity="0.6"/>
  <circle cx="115" cy="88" r="1" fill="#fbbf24" opacity="0.4"/>
</svg>
